<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div style="max-width:430px;margin:0 auto;padding:16px 16px 90px">

  <!-- HEADER ROW -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:24px 0 16px">
    <div>
      <p style="font-size:11px;color:var(--text-secondary);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px">Benvenuto</p>
      <h1 style="font-size:30px;font-weight:800;letter-spacing:-1px">FitTracker 🏋️</h1>
    </div>
    <div style="text-align:right">
      <p id="today-date" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px"></p>
      <div class="toggle-row" style="width:fit-content;margin-left:auto;padding:8px 14px">
        <span id="day-type-label" style="font-size:13px;font-weight:700;margin-right:10px">💪 ON</span>
        <label class="toggle">
          <input type="checkbox" id="day-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- KCAL HERO -->
  <div class="kcal-hero">
    <span class="card-label">🔥 Calorie oggi</span>
    <div class="kcal-number" id="kcal-current">0</div>
    <div class="kcal-subtitle">di <span id="kcal-target">2500</span> kcal target</div>
    <div style="margin-top:16px">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill progress-kcal" id="progress-kcal" style="width:0%"></div>
      </div>
    </div>
    <p id="kcal-remaining" style="font-size:13px;color:var(--accent-green);font-weight:600;margin-top:10px;min-height:18px"></p>
  </div>

  <!-- MACRO CARD -->
  <div class="card">
    <span class="card-label">Macro del giorno</span>

    <div class="macro-row">
      <div class="macro-label">🥩 Proteine</div>
      <div class="macro-value"><span id="protein-current">0</span>g / <span id="protein-target">150</span>g</div>
    </div>
    <div class="progress-bar-bg" style="margin-bottom:14px">
      <div class="progress-bar-fill progress-protein" id="progress-protein" style="width:0%"></div>
    </div>

    <div class="macro-row">
      <div class="macro-label">🍚 Carboidrati</div>
      <div class="macro-value"><span id="carbs-current">0</span>g / <span id="carbs-target">250</span>g</div>
    </div>
    <div class="progress-bar-bg" style="margin-bottom:14px">
      <div class="progress-bar-fill progress-carbs" id="progress-carbs" style="width:0%"></div>
    </div>

    <div class="macro-row">
      <div class="macro-label">🥑 Grassi</div>
      <div class="macro-value"><span id="fats-current">0</span>g / <span id="fats-target">70</span>g</div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill progress-fats" id="progress-fats" style="width:0%"></div>
    </div>
  </div>

  <!-- LAST WORKOUT CARD -->
  <div class="card">
    <span class="card-label">Ultimo allenamento</span>
    <div id="last-workout-content"><div class="spinner"></div></div>
  </div>

  <!-- QUICK ACTIONS -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px">
    <a href="meals-add.html" class="btn-green" style="text-decoration:none;text-align:center;display:block">🥗 Pasto</a>
    <a href="workout-add.html" class="btn-orange" style="text-decoration:none;text-align:center;display:block">💪 Workout</a>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="workout.html" class="nav-item"><span class="nav-icon">💪</span><span>Workout</span></a>
  <a href="meals.html" class="nav-item"><span class="nav-icon">🥗</span><span>Pasti</span></a>
  <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
