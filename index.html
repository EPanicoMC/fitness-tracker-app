<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="max-width:480px;margin:0 auto;padding:16px;padding-bottom:80px">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 0 8px">
    <div>
      <h1 style="font-size:26px;font-weight:800">FitTracker</h1>
      <p id="today-date" style="color:var(--text-secondary);font-size:14px;margin-top:2px"></p>
    </div>
    <!-- Toggle ON/OFF -->
    <div class="toggle-wrapper" style="margin:0;padding:10px 14px">
      <span class="toggle-label" id="day-type-label">ON</span>
      <label class="toggle" style="margin-left:10px">
        <input type="checkbox" id="day-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Kcal Card -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
      <div>
        <p style="color:var(--text-secondary);font-size:13px;margin-bottom:4px">Calorie oggi</p>
        <p style="font-size:28px;font-weight:800">
          <span id="kcal-current">0</span>
          <span style="color:var(--text-secondary);font-size:16px"> / <span id="kcal-target">2500</span> kcal</span>
        </p>
      </div>
      <span id="kcal-remaining" style="color:var(--accent-green);font-size:14px;font-weight:600"></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill progress-kcal" id="progress-kcal" style="width:0%"></div>
    </div>
  </div>

  <!-- Macro Card -->
  <div class="card">
    <p style="font-weight:700;margin-bottom:12px">Macro</p>
    <div class="progress-container">
      <div class="progress-label">
        <span>🥩 Proteine</span>
        <span><span id="protein-current">0</span>g / <span id="protein-target">150</span>g</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill progress-protein" id="progress-protein" style="width:0%"></div>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-label">
        <span>🍚 Carboidrati</span>
        <span><span id="carbs-current">0</span>g / <span id="carbs-target">250</span>g</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill progress-carbs" id="progress-carbs" style="width:0%"></div>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-label">
        <span>🥑 Grassi</span>
        <span><span id="fats-current">0</span>g / <span id="fats-target">70</span>g</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill progress-fats" id="progress-fats" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Ultimo Allenamento -->
  <div class="card" id="last-workout-card">
    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:6px">Ultimo allenamento</p>
    <div id="last-workout-content"><div class="spinner"></div></div>
  </div>

  <!-- Quick Actions -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
    <a href="meals-add.html" class="btn-primary" style="text-decoration:none;text-align:center;padding:14px;display:block;background:var(--accent-green);color:#000">🥗 + Pasto</a>
    <a href="workout-add.html" class="btn-primary" style="text-decoration:none;text-align:center;padding:14px;display:block;background:var(--accent-orange)">💪 + Workout</a>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="workout.html" class="nav-item"><span class="nav-icon">💪</span><span>Workout</span></a>
  <a href="meals.html" class="nav-item"><span class="nav-icon">🥗</span><span>Pasti</span></a>
  <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
