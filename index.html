<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>FitTracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">

  <!-- TOP -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:24px 0 16px">
    <div>
      <p id="welcome-name" style="font-size:11px;color:var(--t2);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Benvenuto</p>
      <h1 style="font-size:28px;font-weight:900;letter-spacing:-1px">FitTracker 🏋️</h1>
      <p id="date-label" style="font-size:13px;color:var(--t2);margin-top:4px"></p>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="streak-box"></div>
      <a href="settings.html" class="btn-icon">⚙️</a>
    </div>
  </div>

  <!-- DAY TYPE + OVERRIDE -->
  <div class="trow" style="margin-bottom:14px">
    <div>
      <div id="dtype-label" style="font-size:15px;font-weight:800"></div>
      <div id="dtype-sub" style="font-size:12px;color:var(--t2)"></div>
    </div>
    <label class="tgl"><input type="checkbox" id="override-tgl"><span class="tgl-s"></span></label>
  </div>

  <!-- NUTRITION HERO -->
  <div class="card card-glow">
    <span class="clabel">🔥 Nutrizione oggi</span>
    <div style="display:flex;align-items:flex-end;justify-content:space-between">
      <div>
        <div class="kcal-big" id="kcal-now">0</div>
        <div class="kcal-sub">di <span id="kcal-tgt">2700</span> kcal target</div>
      </div>
      <div id="cring-box" style="flex-shrink:0"></div>
    </div>
    <div class="pbb h8" style="margin-top:14px"><div class="pbf pb-v" id="pb-kcal" style="width:0%"></div></div>
    <p id="kcal-delta" style="font-size:13px;font-weight:600;margin-top:8px;min-height:18px"></p>
    <div class="mchips">
      <div class="mchip mc-pro"><div class="mchip-v" id="mc-pro">0g</div><div class="mchip-l">Proteine</div></div>
      <div class="mchip mc-carb"><div class="mchip-v" id="mc-carb">0g</div><div class="mchip-l">Carbo</div></div>
      <div class="mchip mc-fat"><div class="mchip-v" id="mc-fat">0g</div><div class="mchip-l">Grassi</div></div>
    </div>
  </div>

  <!-- PASTI -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="clabel" style="margin:0">🥗 Pasti del giorno</span>
    </div>
    <div id="meals-list"><div class="spin"></div></div>
  </div>

  <!-- AI QUICK INPUT -->
  <div class="ai-box">
    <span class="clabel">✨ Calcolo rapido AI</span>
    <textarea id="ai-input" placeholder="Es: 100g pollo, 200g verdure, 130g riso, 20g olio evo"></textarea>
    <button class="btn btn-v btn-sm" onclick="calcAI()" id="ai-btn" style="margin-top:10px;width:auto">🤖 Calcola Macro</button>
    <div class="ai-result" id="ai-result"></div>
  </div>

  <!-- WORKOUT RECAP -->
  <div class="card" id="workout-section">
    <span class="clabel">💪 Allenamento</span>
    <div id="workout-content"><div class="spin"></div></div>
  </div>

  <!-- STATS RAPIDE -->
  <div class="grid2" style="margin-bottom:14px">
    <div class="card card-dark" style="margin:0">
      <span class="clabel">👟 Passi</span>
      <input type="number" class="fi-in" id="steps-in" placeholder="—" style="font-size:24px;width:100%">
    </div>
    <div class="card card-dark" style="margin:0">
      <span class="clabel">🔥 Kcal bruciate</span>
      <input type="number" class="fi-in" id="burned-in" placeholder="—" style="font-size:24px;width:100%">
    </div>
  </div>

  <!-- NOTA -->
  <div class="card card-dark">
    <span class="clabel">📝 Nota del giorno</span>
    <textarea id="note-in" class="fi" rows="2" placeholder="Come ti senti oggi..." style="background:transparent;border:none;padding:0"></textarea>
  </div>

  <!-- SALVA -->
  <button class="btn btn-v" id="save-btn" onclick="saveDay()">💾 Salva Giornata</button>
  <p id="auto-label" style="text-align:center;font-size:11px;color:var(--t3);margin-top:8px"></p>

</div>

<nav class="bnav">
  <a href="index.html" class="on"><span class="ni">🏠</span><span>Home</span></a>
  <a href="programs.html"><span class="ni">💪</span><span>Schede</span></a>
  <a href="diet.html"><span class="ni">🥗</span><span>Dieta</span></a>
  <a href="diary.html"><span class="ni">📅</span><span>Diario</span></a>
  <a href="session.html"><span class="ni">🏋️</span><span>Allenati</span></a>
</nav>

<script type="module" src="js/home.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
