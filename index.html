<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:24px 0 16px">
    <div>
      <h1 style="font-size:28px;font-weight:800;letter-spacing:-1px">FitTracker 🏋️</h1>
      <p id="today-label" style="font-size:13px;color:var(--t2);margin-top:4px"></p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
      <div class="streak-badge" id="streak-badge">🔥 0 giorni</div>
      <div class="ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
          <circle id="ring-fill" cx="36" cy="36" r="28" fill="none"
            stroke="var(--accent)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="175.9" stroke-dashoffset="175.9"
            style="transition:stroke-dashoffset .7s ease"/>
        </svg>
        <div class="ring-num" id="ring-pct">0%</div>
      </div>
    </div>
  </div>

  <!-- BODY WEIGHT + NOTE -->
  <div class="card">
    <span class="clabel">📊 Giornata</span>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <span style="font-size:14px;color:var(--t2);font-weight:600;white-space:nowrap">Peso corpo</span>
      <input type="number" class="fi" id="body-weight"
        step="0.1" min="30" max="300" placeholder="—"
        style="width:110px;text-align:center;font-size:22px;font-weight:800;padding:10px">
      <span style="font-size:14px;color:var(--t2)">kg</span>
    </div>
    <textarea class="fi" id="daily-note" placeholder="Come ti senti oggi..." rows="2"></textarea>
  </div>

  <!-- WORKOUT CARD (populated by JS) -->
  <div class="card" id="workout-card">
    <div class="spin-wrap"></div>
  </div>

  <!-- NUTRITION CARD (populated by JS) -->
  <div class="card" id="nutrition-card">
    <div class="spin-wrap"></div>
  </div>

  <!-- SAVE -->
  <p id="autosave-info" style="text-align:center;font-size:12px;color:var(--t3);margin-bottom:8px;display:none">
    ⚡ Auto-salvataggio attivo
  </p>
  <button class="btn btn-v" onclick="window.saveLog()" style="margin-bottom:8px">💾 Salva Giornata</button>

</div>

<nav class="bnav">
  <a href="index.html" class="active"><span class="ni">🏠</span><span>Home</span></a>
  <a href="programs.html"><span class="ni">💪</span><span>Schede</span></a>
  <a href="diet.html"><span class="ni">🥗</span><span>Dieta</span></a>
  <a href="settings.html"><span class="ni">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/home.js"></script>
</body>
</html>
