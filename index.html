<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:24px 0 16px">
    <div>
      <h1 style="font-size:26px;font-weight:900;letter-spacing:-.5px">FitTracker 🏋️</h1>
      <p id="today-label" style="font-size:13px;color:var(--t2);margin-top:4px"></p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="position:relative;width:72px;height:72px">
        <svg width="72" height="72" viewBox="0 0 72 72" style="display:block">
          <circle cx="36" cy="36" r="28" fill="none" stroke="var(--bg4)" stroke-width="5"/>
          <circle id="ring-fill" cx="36" cy="36" r="28" fill="none"
            stroke="var(--accent)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="175.9" stroke-dashoffset="175.9"
            transform="rotate(-90 36 36)"/>
        </svg>
        <div id="ring-pct" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800">0%</div>
      </div>
      <div style="font-size:10px;color:var(--t3);font-weight:600">completato</div>
    </div>
  </div>

  <!-- GIORNATA CARD -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span class="clabel" style="margin:0">📊 Giornata</span>
      <!-- day override toggle -->
      <div style="display:flex;align-items:center;gap:8px">
        <span id="day-type-label" style="font-size:12px;color:var(--t2);font-weight:600"></span>
        <label class="tgl">
          <input type="checkbox" id="day-override-toggle" onchange="window._onOverrideChange(this.checked)">
          <span class="tgl-s"></span>
        </label>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <span style="font-size:13px;color:var(--t2);font-weight:600;white-space:nowrap">Peso</span>
      <input type="number" class="fi" id="body-weight"
        step="0.1" min="30" max="300" placeholder="—"
        style="width:110px;text-align:center;font-size:22px;font-weight:800;padding:10px"
        oninput="window._onBodyWeightChange(this.value)">
      <span style="font-size:13px;color:var(--t2)">kg</span>
      <div style="flex:1"></div>
      <span style="font-size:13px;color:var(--t2);font-weight:600;white-space:nowrap">Steps</span>
      <input type="number" class="fi" id="steps-input"
        step="100" min="0" placeholder="—"
        style="width:100px;text-align:center;font-size:18px;font-weight:800;padding:10px"
        oninput="window._onStepsChange(this.value)">
    </div>
    <textarea class="notes-area" id="daily-note" placeholder="Come ti senti oggi…" rows="2"
      oninput="window._onNoteChange(this.value)"></textarea>
  </div>

  <!-- WORKOUT CARD -->
  <div id="workout-card" class="card">
    <div class="spin-wrap"></div>
  </div>

  <!-- NUTRITION CARD -->
  <div id="nutrition-card" class="card">
    <div class="spin-wrap"></div>
  </div>

  <!-- SAVE -->
  <p id="autosave-info" style="text-align:center;font-size:11px;color:var(--t3);margin-bottom:8px;display:none">⚡ Auto-salvataggio attivo</p>
  <button class="btn btn-v" onclick="window.saveLog()" style="margin-bottom:8px">💾 Salva Giornata</button>

</div>

<nav class="bnav">
  <a href="index.html" class="active"><span class="ni">🏠</span><span>Home</span></a>
  <a href="live.html" class="nav-workout"><span class="ni">▶️</span><span>Live</span></a>
  <a href="programs.html"><span class="ni">💪</span><span>Schede</span></a>
  <a href="diet.html"><span class="ni">🥗</span><span>Dieta</span></a>
  <a href="settings.html"><span class="ni">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/home.js"></script>
</body>
</html>
