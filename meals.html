<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Pasti</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="max-width:480px;margin:0 auto;padding:16px;padding-bottom:80px">
  <div class="page-header"><h1>Alimentazione</h1></div>

  <!-- Date navigation -->
  <div class="date-nav">
    <button onclick="window.changeDate(-1)">←</button>
    <span id="current-date-display"></span>
    <button onclick="window.changeDate(1)" id="next-day-btn">→</button>
  </div>

  <!-- Riepilogo -->
  <div class="card" id="summary-card">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:22px;font-weight:800" id="total-kcal">0</span>
      <span style="color:var(--text-secondary);font-size:14px;align-self:flex-end">kcal</span>
    </div>
    <div class="progress-bar-bg" style="margin-bottom:12px">
      <div class="progress-bar-fill progress-kcal" id="meals-progress-kcal" style="width:0%"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;font-size:13px">
      <div>
        <p style="color:#4fc3f7;font-weight:700" id="total-protein">0g</p>
        <p style="color:var(--text-secondary)">Proteine</p>
      </div>
      <div>
        <p style="color:#ffd54f;font-weight:700" id="total-carbs">0g</p>
        <p style="color:var(--text-secondary)">Carbo</p>
      </div>
      <div>
        <p style="color:#ff8a65;font-weight:700" id="total-fats">0g</p>
        <p style="color:var(--text-secondary)">Grassi</p>
      </div>
    </div>
  </div>

  <div id="meals-list"><div class="spinner"></div></div>

  <a href="meals-add.html" class="btn-primary" style="text-decoration:none;text-align:center;display:block;margin-top:12px">🥗 Aggiungi Pasto</a>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="workout.html" class="nav-item"><span class="nav-icon">💪</span><span>Workout</span></a>
  <a href="meals.html" class="nav-item active"><span class="nav-icon">🥗</span><span>Pasti</span></a>
  <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/meals.js"></script>
</body>
</html>
