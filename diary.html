<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KOVA.</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <h1>📅 Diario</h1>
    <a href="checks.html" class="btn btn-ghost btn-sm">📸 Check</a>
  </div>

  <!-- PROSSIMA SESSIONE -->
  <div id="next-session"></div>

  <!-- TAB SWITCHER -->
  <div class="tab-sw">
    <button class="tab-btn" onclick="showTab('week')">📊 7 Giorni</button>
    <button class="tab-btn tab-active" onclick="showTab('cal')">🗓️ Mese</button>
  </div>

  <!-- WEEK VIEW -->
  <div id="week-view" style="display:none">
    <div class="spin"></div>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="cal-view" style="display:block">
    <!-- MONTH NAV -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="btn-icon" onclick="changeMonth(-1)">←</button>
      <span id="month-label" style="font-size:18px;font-weight:800"></span>
      <button class="btn-icon" onclick="changeMonth(1)">→</button>
    </div>

    <!-- CALENDAR HEADER -->
    <div class="cal-grid" style="margin-bottom:4px">
      <div class="cal-head">Lun</div>
      <div class="cal-head">Mar</div>
      <div class="cal-head">Mer</div>
      <div class="cal-head">Gio</div>
      <div class="cal-head">Ven</div>
      <div class="cal-head">Sab</div>
      <div class="cal-head">Dom</div>
    </div>

    <!-- CALENDAR DAYS -->
    <div class="cal-grid" id="cal-grid"></div>

    <!-- DAY DETAIL -->
    <div id="day-detail" style="margin-top:16px;display:none"></div>
  </div>
</div>

</nav>
