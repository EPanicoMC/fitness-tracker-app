</head>
<body>
  <h1>🌱 Seed Database</h1>

  <div id="log"><span class="inf">Pronto. Premi il pulsante per iniziare.</span></div>
  <button id="btn" onclick="runSeed()">▶ Avvia Seed</button>
  <button class="secondary" onclick="location.reload()" style="margin-top:8px">🔄 Reset e Ricarica</button>
  <a href="index.html" id="go-home" style="display:none">→ Vai alla Home</a>

};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db  = getFirestore(app);
const UID = 'user_default';

const logEl  = document.getElementById('log');
const progEl = document.getElementById('prog-fill');
let step = 0, totalSteps = 5;

function log(msg, cls = 'inf') {
  logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function setProgress(n) { progEl.style.width = Math.round((n / totalSteps) * 100) + '%'; }

function makeId(name) {
  return name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
}

window.runSeed = async function() {
  document.getElementById('btn').disabled = true;
  logEl.innerHTML = '';
  step = 0;
  setProgress(0);
  try {
    await seedProgram();   setProgress(++step);
    await seedExerciseLibrary(); setProgress(++step);
    await seedDiet();      setProgress(++step);
    await seedCheck();     setProgress(++step);
    await seedSettings();  setProgress(++step);
    log('─────────────────────────', 'inf');
    log('✅ Tutti i dati caricati!', 'ok');
    document.getElementById('go-home').style.display = 'block';
  } catch(e) {
    log('❌ Errore: ' + e.message, 'err');
    console.error(e);
  }
  document.getElementById('btn').disabled = false;
};
