<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Seed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="ph"><h1>🌱 Seed Database</h1></div>

    <p style="color:var(--t2);font-size:14px;margin-bottom:20px">Carica i dati iniziali nel database. <strong style="color:var(--red)">Attenzione: sovrascrive i dati esistenti.</strong></p>

  <div id="log" style="font-size:13px;font-family:monospace;color:var(--t2);line-height:2"></div>

<script type="module">

function log(msg, ok=true) {
  const el = document.getElementById('log');
  el.innerHTML += `<div style="color:${ok?'var(--green)':'var(--red)'}">${msg}</div>`;
}

</script>
</body>
</html>
