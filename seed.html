function log(msg, cls='inf') {

}

window.runSeed = async function() {
  document.getElementById('btn').disabled = true;
  logEl.innerHTML = '';

    await seedProgram();

    await seedSettings();
    log('─────────────────────────', 'inf');

    document.getElementById('go-home').style.display = 'block';
  } catch(e) {
    log('❌ Errore: ' + e.message, 'err');
    console.error(e);
  }
  document.getElementById('btn').disabled = false;
};
