<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Live</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <div style="flex:1">
      <h1 id="session-name">Allenamento</h1>
      <p id="session-meta" style="font-size:11px;color:var(--t2);margin-top:2px"></p>
    </div>
    <div>
      <span class="badge badge-live" id="live-badge">● LIVE</span>
    </div>
  </div>

  <!-- SESSION TIMER -->
  <div class="card" style="text-align:center;padding:20px 16px">
    <div style="font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Durata sessione</div>
    <div class="timer-big" id="session-timer">00:00</div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button class="btn btn-ghost btn-sm" onclick="window._pauseResume()" id="pause-btn">⏸ Pausa</button>
      <button class="btn btn-r btn-sm" onclick="window._finishSession()">✓ Termina</button>
    </div>
  </div>

  <!-- REST TIMER (hidden by default) -->
  <div class="card" id="rest-card" style="display:none;text-align:center;padding:16px">
    <div style="font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;margin-bottom:6px">Recupero</div>
    <div class="timer-rest" id="rest-timer">00:00</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:auto" onclick="window._skipRest()">Skip ›</button>
  </div>

  <!-- EXERCISES LIST -->
  <div id="live-ex-list"></div>

  <!-- FINISH -->
  <button class="btn btn-g" onclick="window._finishSession()" style="margin-bottom:8px">✅ Salva e termina</button>

</div>

<nav class="bnav">
  <a href="index.html"><span class="ni">🏠</span><span>Home</span></a>
  <a href="live.html" class="active nav-workout"><span class="ni">▶️</span><span>Live</span></a>
  <a href="programs.html"><span class="ni">💪</span><span>Schede</span></a>
  <a href="diet.html"><span class="ni">🥗</span><span>Dieta</span></a>
  <a href="settings.html"><span class="ni">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/live.js"></script>
</body>
</html>
