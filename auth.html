<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kova - Accesso</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: var(--bg-primary, #121212);
      color: var(--text-primary, #fff);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .auth-container {
      background-color: var(--bg-secondary, #1e1e1e);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--text-secondary, #aaa);
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color, #333);
      border-radius: 8px;
      background-color: var(--bg-primary, #121212);
      color: var(--text-primary, #fff);
      box-sizing: border-box;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-color, #bb86fc);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .toggle-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: var(--text-secondary, #aaa);
    }
    .toggle-link a {
      color: var(--accent-color, #bb86fc);
      text-decoration: none;
    }
    #error-msg {
      color: #ff4d4d;
      margin-bottom: 15px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h1>Kova Fitness</h1>
    
    <div id="error-msg"></div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit">Accedi</button>
      <div class="toggle-link">
        Non hai un account? <a href="#" id="show-register">Registrati</a>
      </div>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display: none;">
      <div class="input-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" required>
      </div>
      <div class="input-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" required>
      </div>
      <button type="submit">Registrati</button>
      <div class="toggle-link">
        Hai già un account? <a href="#" id="show-login">Accedi</a>
      </div>
    </form>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
