<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1><i class="ri-settings-4-fill"></i> Impostazioni</h1>
  </div>

  <div class="card">
    <span class="clabel">👤 Profilo</span>
    <div class="s-row">
      <div><div class="s-lbl">Nome</div></div>
      <input class="fi" id="s-name" style="width:150px;text-align:right;background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:4px 8px">
    </div>
    <div class="s-row">
      <div><div class="s-lbl">Altezza</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" class="fi-in" id="s-height" style="width:60px"> <span style="color:var(--t2);font-size:13px">cm</span>
      </div>
    </div>
    <div class="s-row">
      <div><div class="s-lbl">Peso target</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" class="fi-in" id="s-wtarget" style="width:60px" step="0.5"> <span style="color:var(--t2);font-size:13px">kg</span>
      </div>
    </div>
    <div class="s-row">
      <div><div class="s-lbl">Obiettivo passi</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" class="fi-in" id="s-steps-goal" style="width:80px" placeholder="10000"> <span style="color:var(--t2);font-size:13px">passi/giorno</span>
      </div>
    </div>
  </div>

  <div class="card">
    <span class="clabel">ℹ️ App</span>
    <p style="color:var(--t2);font-size:13px">KOVA. v3.0</p>
    <a href="seed.html" style="display:block;font-size:12px;color:var(--accent);margin-top:10px">🌱 Ricarica dati seed</a>
  </div>

  <button class="btn btn-v" onclick="saveSettings()">💾 Salva</button>

  <div class="card" style="margin-top:14px">
    <span class="clabel">🤖 Gemini AI</span>
    <div class="s-row">
      <div>
        <div class="s-lbl">API Key</div>
        <div class="s-sub">Usata per il calcolo macro automatico</div>
      </div>
    </div>
    <div class="fg" style="margin-top:12px">
      <input type="password" class="fi" id="gemini-key-input"
             placeholder="AIza...">
      <p id="gemini-key-status" style="font-size:12px;margin-top:6px;color:var(--t2)"></p>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="saveGeminiKey()"
            style="margin-top:8px;width:auto">
      💾 Salva Key
    </button>
  </div>
</div>

<script type="module" src="js/settings.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
