<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Settings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <div class="ph">
    <h1>⚙️ Impostazioni</h1>
  </div>

  <!-- AUTO-SAVE -->
  <div class="card">
    <span class="clabel">Auto-salvataggio</span>
    <div class="trow" style="margin-bottom:14px">
      <div>
        <div style="font-weight:700;font-size:15px">Abilita auto-salvataggio</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px">Salva la giornata automaticamente</div>
      </div>
      <label class="tgl">
        <input type="checkbox" id="auto-save-toggle"
          onchange="window._toggleAutoSave(this.checked)">
        <span class="tgl-s"></span>
      </label>
    </div>
    <div class="fg" id="interval-wrap" style="display:none">
      <label class="fl">Intervallo salvataggio</label>
      <select class="fi" id="auto-save-interval">
        <option value="1">1 minuto</option>
        <option value="3">3 minuti</option>
        <option value="5" selected>5 minuti</option>
        <option value="10">10 minuti</option>
      </select>
    </div>
  </div>

  <!-- PROFILO -->
  <div class="card">
    <span class="clabel">Profilo</span>
    <div class="fg">
      <label class="fl">Nome</label>
      <input type="text" class="fi" id="profile-name" placeholder="Il tuo nome…">
    </div>
    <div class="grid2">
      <div class="fg">
        <label class="fl">Peso target (kg)</label>
        <input type="number" class="fi" id="profile-weight" placeholder="78" step="0.1">
      </div>
      <div class="fg">
        <label class="fl">Altezza (cm)</label>
        <input type="number" class="fi" id="profile-height" placeholder="175">
      </div>
    </div>
  </div>

  <button class="btn btn-v" onclick="window.saveSettings()" style="margin-bottom:20px">
    💾 Salva Impostazioni
  </button>

  <!-- CHECK-IN -->
  <div class="card">
    <span class="clabel">Monitoraggio corpo</span>
    <a href="checks.html" class="btn btn-ghost" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">
      📏 Vai ai Check-in
    </a>
  </div>

  <!-- SEED -->
  <div class="card">
    <span class="clabel">Database</span>
    <a href="seed.html" class="btn btn-ghost" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t2)">
      🌱 Seed dati iniziali
    </a>
  </div>

  <!-- INFO APP -->
  <div class="card" style="text-align:center">
    <p style="font-size:22px;margin-bottom:8px">🏋️</p>
    <p style="font-weight:800;font-size:18px;margin-bottom:4px">FitTracker v3.0</p>
    <p style="font-size:13px;color:var(--t2)">Il tuo diario personale fitness</p>
    <p style="font-size:12px;color:var(--t3);margin-top:12px">Firebase · HTML · CSS · JavaScript</p>
  </div>

</div>

<nav class="bnav">
  <a href="index.html"><span class="ni">🏠</span><span>Home</span></a>
  <a href="live.html" class="nav-workout"><span class="ni">▶️</span><span>Live</span></a>
  <a href="programs.html"><span class="ni">💪</span><span>Schede</span></a>
  <a href="diet.html"><span class="ni">🥗</span><span>Dieta</span></a>
  <a href="settings.html" class="active"><span class="ni">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/settings.js"></script>
</body>
</html>
