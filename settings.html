<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>FitTracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1>⚙️ Impostazioni</h1>
  </div>

  <div class="card">
    <span class="clabel">👤 Profilo</span>
    <div class="s-row">
      <div><div class="s-lbl">Nome</div></div>
      <input class="fi" id="s-name" style="width:150px;text-align:right;background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:4px 8px">
    </div>
    <div class="s-row">
      <div><div class="s-lbl">Altezza</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" class="fi-in" id="s-height" style="width:60px"> <span style="color:var(--t2);font-size:13px">cm</span>
      </div>
    </div>
    <div class="s-row">
      <div><div class="s-lbl">Peso target</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" class="fi-in" id="s-wtarget" style="width:60px" step="0.5"> <span style="color:var(--t2);font-size:13px">kg</span>
      </div>
    </div>
  </div>

  <div class="card">
    <span class="clabel">💾 Auto-salvataggio</span>
    <div class="s-row">
      <div><div class="s-lbl">Attivo</div><div class="s-sub">Salva automaticamente la home</div></div>
      <label class="tgl"><input type="checkbox" id="s-autosave"><span class="tgl-s"></span></label>
    </div>
    <div class="s-row">
      <div class="s-lbl">Intervallo</div>
      <select class="fi" id="s-interval" style="width:100px">
        <option value="1">1 min</option>
        <option value="3">3 min</option>
        <option value="5" selected>5 min</option>
        <option value="10">10 min</option>
      </select>
    </div>
  </div>

  <div class="card">
    <span class="clabel">ℹ️ App</span>
    <p style="color:var(--t2);font-size:13px">FitTracker v2.0</p>
    <p style="color:var(--t3);font-size:12px;margin-top:4px">Made with ❤️ by Emanuele</p>
    <a href="seed.html" style="display:block;font-size:12px;color:var(--accent);margin-top:10px">🌱 Ricarica dati seed</a>
  </div>

  <button class="btn btn-v" onclick="saveSettings()">💾 Salva</button>
</div>

<script type="module" src="js/settings.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
