<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div id="diet-today-section" style="margin-bottom:40px;">
    <h2 style="font-size:24px;font-weight:900;color:var(--t1);margin:24px 0 16px;">Oggi</h2>
    <!-- RECAP MACRO -->
    <div id="diet-recap" class="card" style="padding:16px; margin-bottom:16px;">
      <div style="font-size:12px;font-weight:800;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Riepilogo (Pasti Spuntati)</div>
      <div class="mchips-dogma" style="display:flex;gap:8px;margin-bottom:12px">
        <div class="mchip mchip-min" style="background:rgba(255,255,255,.05)!important;padding:8px!important;border-radius:12px!important">
          <div>
            <div class="mchip-l" style="font-size:9px!important;color:var(--t2)!important;margin-bottom:2px">Kcal Totali</div>
            <div class="mchip-v" id="recap-kcal" style="font-size:18px!important;color:#fff!important">0</div>
          </div>
        </div>
      </div>
      <div class="mchips-dogma" style="display:flex;gap:8px">
        <div class="mchip mchip-min" style="background:rgba(255,255,255,.05)!important;padding:8px!important;border-radius:12px!important">
          <div>
            <div class="mchip-l" style="font-size:9px!important;color:var(--t2)!important;margin-bottom:2px">Proteine</div>
            <div class="mchip-v" id="recap-pro" style="font-size:14px!important;color:#fff!important">0g</div>
          </div>
        </div>
        <div class="mchip mchip-min" style="background:rgba(255,255,255,.05)!important;padding:8px!important;border-radius:12px!important">
          <div>
            <div class="mchip-l" style="font-size:9px!important;color:var(--t2)!important;margin-bottom:2px">Carbo</div>
            <div class="mchip-v" id="recap-carb" style="font-size:14px!important;color:#fff!important">0g</div>
          </div>
        </div>
        <div class="mchip mchip-min" style="background:rgba(255,255,255,.05)!important;padding:8px!important;border-radius:12px!important">
          <div>
            <div class="mchip-l" style="font-size:9px!important;color:var(--t2)!important;margin-bottom:2px">Grassi</div>
            <div class="mchip-v" id="recap-fat" style="font-size:14px!important;color:#fff!important">0g</div>
          </div>
        </div>
      </div>
    </div>
    <!-- PASTI -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="clabel" style="margin:0"><i class="ri-restaurant-2-line"></i> Pasti del giorno</span>
      </div>
      <div id="meals-list"><div class="spin"></div></div>
      <button class="btn btn-ghost btn-sm" onclick="openAddMeal()" style="margin-top:12px;width:100%">+ Aggiungi pasto extra</button>
    </div>
    <!-- AI QUICK INPUT -->
    <div class="ai-box">
      <span class="clabel"><i class="ri-magic-line"></i> Calcolo rapido AI</span>
      <textarea id="ai-input" placeholder="Es: 100g pollo, 200g verdure, 130g riso, 20g olio evo"></textarea>
      <button class="btn btn-v btn-sm" onclick="calcAI()" id="ai-btn" style="margin-top:10px;width:auto"><i class="ri-robot-2-line"></i> Calcola Macro</button>
      <div class="ai-result" id="ai-result"></div>
    </div>
  </div>

  <h2 style="font-size:24px;font-weight:900;color:var(--t1);margin:24px 0 16px;">Archivio Piani</h2>
  <div class="ph">
    <h1>🥗 Dieta</h1>
    <button class="btn btn-v btn-sm" onclick="openNewDiet()">＋ Nuovo</button>
  </div>
  <div id="diet-list"><div class="spin"></div></div>
  <div id="diet-form" style="display:none"></div>
</div>

<nav class="bnav">
  <a href="index.html"><i class="ri-home-5-fill ni"></i><span>Home</span></a>
  <a href="programs.html"><i class="ri-file-list-3-fill ni"></i><span>Schede</span></a>
  <a href="diet.html" class="on"><i class="ri-restaurant-fill ni"></i><span>Dieta</span></a>
  <a href="diary.html"><i class="ri-calendar-todo-fill ni"></i><span>Diario</span></a>
  <a href="session.html"><i class="ri-play-circle-fill ni"></i><span>Allenati</span></a>
</nav>

<script type="module" src="js/diet.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
<script type="module" src="js/daily_state.js"></script>
</body>
</html>
