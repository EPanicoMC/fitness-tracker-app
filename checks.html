<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1>📸 Check</h1>
    <button class="btn btn-v btn-sm" onclick="openNewCheck()">＋ Nuovo</button>
  </div>
  
  <!-- PROGRESSI HEADER -->
  <div style="display:flex;justify-content:center;gap:12px;margin-bottom:24px;">
    <button class="btn btn-v btn-sm" style="border-radius:100px;padding:8px 20px; font-weight:700">SETTIMANA</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:8px 20px; color:var(--t3)">MESE</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:8px 20px; color:var(--t3)">ANNO</button>
  </div>

  <!-- VOLUME ALLENAMENTO -->
  <div class="card card-dark" style="margin-bottom:24px;padding:24px; border-radius:24px; background:rgba(255,255,255,0.02)">
    <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Volume Allenamento</div>
    <div style="font-size:32px;font-weight:900;color:var(--t1); margin-bottom:2px"><span id="vol-total">0</span> <span style="font-size:16px;color:var(--t3);font-weight:500">kg</span></div>
    <div style="font-size:13px;color:var(--accent);font-weight:700;margin-bottom:24px" id="vol-trend">+0% vs settimana scorsa</div>
    
    <!-- BAR CHART -->
    <div id="vol-chart" style="display:flex;justify-content:space-between;align-items:flex-end;height:140px;gap:10px;padding-top:20px; position:relative">
      <!-- Grid lines -->
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:0"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:33%"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:66%"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); bottom:0"></div>
      <div class="spin"></div>
    </div>
  </div>

  <!-- GRUPPI MUSCOLARI -->
  <div id="body-map-section" class="card card-dark" style="position:relative; margin-bottom:30px; padding:24px; border-radius:24px; background:rgba(255,255,255,0.02)">
    <div style="font-size:11px;color:var(--t3);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px">Gruppi Muscolari</div>
    
    <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:20px; align-items:start">
      <!-- TWO SILHOUETTES -->
      <div style="display:flex; gap:10px; justify-content:center; align-items:center">
        <!-- Front -->
        <svg viewBox="0 0 100 220" style="width:100%; max-width:80px; overflow:visible;">
          <style>
            .m-zone { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.1); stroke-width: 0.5; transition: all 0.3s; cursor: pointer; }
            .m-zone:hover, .m-zone.active { fill: rgba(255,106,0,0.3); stroke: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
          </style>
          <g transform="scale(0.8) translate(12,10)">
            <!-- Front Head -->
            <path class="m-zone" id="bz-head" d="M50,5 C58,5 58,25 50,25 C42,25 42,5 50,5 Z"/>
            <!-- Front Torso -->
            <path class="m-zone" id="bz-chest" d="M35,30 C40,28 60,28 65,30 L65,70 L35,70 Z"/>
            <path class="m-zone" id="bz-waist" d="M35,75 L65,75 L60,110 L40,110 Z"/>
            <!-- Front Arms -->
            <path class="m-zone" id="bz-bicep_l" d="M30,32 C25,35 20,60 25,100 L32,100 L32,32 Z"/>
            <path class="m-zone" id="bz-bicep_r" d="M70,32 C75,35 80,60 75,100 L68,100 L68,32 Z"/>
            <!-- Front Legs -->
            <path class="m-zone" id="bz-thigh_l" d="M35,115 L48,115 L45,170 C40,170 30,150 35,115 Z"/>
            <path class="m-zone" id="bz-thigh_r" d="M52,115 L65,115 L65,150 C70,150 60,170 52,170 Z"/>
          </g>
        </svg>
        
        <!-- Back -->
        <svg viewBox="0 0 100 220" style="width:100%; max-width:80px; overflow:visible;">
          <g transform="scale(0.8) translate(12,10)">
            <!-- Back Head -->
            <path class="m-zone" d="M50,5 C58,5 58,25 50,25 C42,25 42,5 50,5 Z"/>
            <!-- Back Torso -->
            <path class="m-zone" id="bz-back" d="M35,30 C40,28 60,28 65,30 L65,110 L35,110 Z"/>
            <!-- Back Arms -->
            <path class="m-zone" d="M30,32 C25,35 20,60 25,100 L32,100 L32,32 Z"/>
            <path class="m-zone" d="M70,32 C75,35 80,60 75,100 L68,100 L68,32 Z"/>
            <!-- Back Legs -->
            <path class="m-zone" id="bz-glutes" d="M35,115 L65,115 L60,140 L40,140 Z"/>
            <path class="m-zone" id="bz-hamstrings_l" d="M35,145 L48,145 L45,210 L35,210 Z"/>
            <path class="m-zone" id="bz-hamstrings_r" d="M52,145 L65,145 L65,210 L55,210 Z"/>
          </g>
        </svg>
      </div>

      <!-- LEGEND -->
      <div style="display:flex; flex-direction:column; gap:16px;">
        <div class="legend-item" onclick="window.showZone('chest', 'Petto')">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:10px; font-weight:800; color:var(--t1)">PETTO</span>
            <span style="font-size:10px; font-weight:800; color:var(--t3)" id="pct-chest">0%</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-chest" style="width:0%; background:rgba(255,255,255,0.2)"></div></div>
        </div>
        <div class="legend-item" onclick="window.showZone('back', 'Dorso')">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:10px; font-weight:800; color:var(--t1)">DORSO</span>
            <span style="font-size:10px; font-weight:800; color:var(--t3)" id="pct-back">0%</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-back" style="width:0%; background:rgba(255,106,0,0.4)"></div></div>
        </div>
        <div class="legend-item" onclick="window.showZone('legs', 'Gambe')">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:10px; font-weight:800; color:var(--t1)">GAMBE</span>
            <span style="font-size:10px; font-weight:800; color:var(--accent)" id="pct-legs">0%</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-legs" style="width:0%; background:var(--accent)"></div></div>
        </div>
        <div class="legend-item" onclick="window.showZone('shoulders', 'Spalle')">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:10px; font-weight:800; color:var(--t1)">SPALLE</span>
            <span style="font-size:10px; font-weight:800; color:var(--t3)" id="pct-shoulders">0%</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-shoulders" style="width:0%; background:rgba(255,255,255,0.2)"></div></div>
        </div>
        <div class="legend-item" onclick="window.showZone('arms', 'Braccia')">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:10px; font-weight:800; color:var(--t1)">BRACCIA</span>
            <span style="font-size:10px; font-weight:800; color:var(--t3)" id="pct-arms">0%</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-arms" style="width:0%; background:rgba(255,255,255,0.2)"></div></div>
        </div>
      </div>
    </div>

    <div id="zone-info" style="margin-top:24px; min-height:60px; padding:16px; background:rgba(255,255,255,0.03); border-radius:16px; border:1px solid rgba(255,255,255,0.05);">
      <div style="font-size:13px;color:var(--t3);line-height:1.6; text-align:center">Tocca un gruppo muscolare per i dettagli.</div>
    </div>
  </div>

  <div id="checks-list-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:900;color:var(--t1)">Storico Completo</h2>
    </div>
    <div id="checks-list"><div class="spin"></div></div>
  </div>
  <div id="check-form" style="display:none"></div>
</div>

<script type="module" src="js/checks.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
