<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1>📸 Check</h1>
    <button class="btn btn-v btn-sm" onclick="openNewCheck()">＋ Nuovo</button>
  </div>
  
  <!-- PROGRESSI HEADER -->
  <div style="display:flex;justify-content:center;gap:10px;margin-bottom:24px;">
    <button class="btn btn-v btn-sm" style="border-radius:100px;padding:6px 16px;">SETTIMANA</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:6px 16px;">MESE</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:6px 16px;">ANNO</button>
  </div>

  <!-- VOLUME ALLENAMENTO -->
  <div class="card card-dark" style="margin-bottom:20px;padding:24px;">
    <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:4px">Volume Allenamento</div>
    <div style="font-size:28px;font-weight:900;color:var(--t1)"><span id="vol-total">0</span> <span style="font-size:14px;color:var(--t3);font-weight:700">kg</span></div>
    <div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:24px" id="vol-trend">+0% vs settimana scorsa</div>
    
    <!-- BAR CHART (Mockup structure for JS) -->
    <div id="vol-chart" style="display:flex;justify-content:space-between;align-items:flex-end;height:120px;gap:8px;padding-top:20px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:8px">
      <div class="spin"></div>
    </div>
  </div>

  <!-- BODY MAP -->
  <div id="body-map-section" class="card card-dark" style="position:relative; margin-bottom:30px; padding:24px;">
    <div style="font-size:11px;color:var(--t2);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px">Gruppi Muscolari</div>
    <div style="display:flex;gap:20px;align-items:center;">
      <div style="flex:1">
        <svg viewBox="0 0 200 300" style="width:100%; display:block; overflow:visible;">
          <style>
            .b-zone { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.1); stroke-width: 2; transition: all 0.2s; cursor: pointer; }
            .b-zone:hover, .b-zone.active { fill: rgba(186,255,41,0.3); stroke: #baff29; filter: drop-shadow(0 0 8px #baff29); transform-origin: center; transform: scale(1.02); }
          </style>
          <!-- Stylized abstract body -->
          <!-- Head -->
          <circle cx="100" cy="30" r="16" class="b-zone" id="bz-head" onclick="window.showZone('weight', 'Peso')"/>
          <!-- Chest/Shoulders -->
          <path d="M 60 50 Q 100 40 140 50 L 135 90 L 65 90 Z" rx="10" class="b-zone" id="bz-chest" onclick="window.showZone('chest', 'Petto')"/>
          <!-- Waist/Abs -->
          <path d="M 65 95 L 135 95 L 125 140 L 75 140 Z" rx="10" class="b-zone" id="bz-waist" onclick="window.showZone('waist', 'Core / Vita')"/>
          <!-- Left Arm -->
          <rect x="35" y="55" width="20" height="60" rx="10" class="b-zone" id="bz-bicep_l" onclick="window.showZone('bicep_l', 'Braccio SX')"/>
          <!-- Right Arm -->
          <rect x="145" y="55" width="20" height="60" rx="10" class="b-zone" id="bz-bicep_r" onclick="window.showZone('bicep_r', 'Braccio DX')"/>
          <!-- Left Leg -->
          <rect x="70" y="145" width="24" height="70" rx="12" class="b-zone" id="bz-thigh_l" onclick="window.showZone('thigh_l', 'Coscia SX')"/>
          <!-- Right Leg -->
          <rect x="106" y="145" width="24" height="70" rx="12" class="b-zone" id="bz-thigh_r" onclick="window.showZone('thigh_r', 'Coscia DX')"/>
          <!-- Left Calf -->
          <rect x="73" y="220" width="18" height="50" rx="9" class="b-zone" id="bz-calf_l" onclick="window.showZone('calf_l', 'Polpaccio SX')"/>
          <!-- Right Calf -->
          <rect x="109" y="220" width="18" height="50" rx="9" class="b-zone" id="bz-calf_r" onclick="window.showZone('calf_r', 'Polpaccio DX')"/>
        </svg>
      </div>
      <div style="width:100px; display:flex; flex-direction:column; gap:16px;">
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);display:inline-block;margin-right:6px"></div>PETTO<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-chest">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:#baff29;display:inline-block;margin-right:6px"></div>CORE<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-waist">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:#baff29;display:inline-block;margin-right:6px"></div>GAMBE<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-legs">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:#baff29;display:inline-block;margin-right:6px"></div>BRACCIA<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-arms">—</span></div>
      </div>
    </div>
    <div id="zone-info" style="margin-top:20px; min-height:60px; padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(255,255,255,0.03);">
      <div style="font-size:13px;color:var(--t3);line-height:1.6">Tocca un gruppo muscolare sulla sinistra per espandere lo storico.</div>
    </div>
  </div>

  <div id="checks-list-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:900;color:var(--t1)">Storico Completo</h2>
    </div>
    <div id="checks-list"><div class="spin"></div></div>
  </div>
  <div id="check-form" style="display:none"></div>
</div>

<script type="module" src="js/checks.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
