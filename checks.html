<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1>📸 Check</h1>
    <button class="btn btn-v btn-sm" onclick="openNewCheck()">＋ Nuovo</button>
  </div>
  
  <!-- PROGRESSI HEADER -->
  <div style="display:flex;justify-content:center;gap:12px;margin-bottom:24px;">
    <button class="btn btn-v btn-sm" style="border-radius:100px;padding:8px 20px; font-weight:700">SETTIMANA</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:8px 20px; color:var(--t3)">MESE</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:8px 20px; color:var(--t3)">ANNO</button>
  </div>

  <!-- VOLUME ALLENAMENTO -->
  <div class="card card-dark" style="margin-bottom:24px;padding:24px; border-radius:24px; background:rgba(255,255,255,0.02)">
    <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Volume Allenamento</div>
    <div style="font-size:32px;font-weight:900;color:var(--t1); margin-bottom:2px"><span id="vol-total">0</span> <span style="font-size:16px;color:var(--t3);font-weight:500">kg</span></div>
    <div style="font-size:13px;color:var(--accent);font-weight:700;margin-bottom:24px" id="vol-trend">+0% vs settimana scorsa</div>
    
    <!-- BAR CHART -->
    <div id="vol-chart" style="display:flex;justify-content:space-between;align-items:flex-end;height:140px;gap:10px;padding-top:20px; position:relative">
      <!-- Grid lines -->
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:0"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:33%"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); top:66%"></div>
      <div style="position:absolute; width:100%; height:1px; background:rgba(255,255,255,0.05); bottom:0"></div>
      <div class="spin"></div>
    </div>
  </div>

  <!-- GRUPPI MUSCOLARI -->
  <div id="body-map-section" class="card card-dark" style="position:relative; margin-bottom:30px; padding:24px; border-radius:24px; background:rgba(255,255,255,0.02)">
    <div style="font-size:11px;color:var(--t3);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px">Gruppi Muscolari</div>
    
    <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:16px; align-items:start">
      <div style="position:relative; display:flex; justify-content:center">
        <img src="img/anatomy.png" alt="Anatomia muscolare" style="width:100%; max-width:220px; opacity:0.85; filter:brightness(1.1)"/>
        <!-- SVG overlay zones -->
        <svg viewBox="0 0 1024 1024" style="position:absolute; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:220px; height:100%;" preserveAspectRatio="xMidYMid meet">
          <style>
            .ov-zone { fill: transparent; stroke: transparent; stroke-width: 2; cursor: pointer; transition: all 0.4s; }
            .ov-zone:hover, .ov-zone.active { fill: rgba(255,106,0,0.25); stroke: rgba(255,106,0,0.6); filter: drop-shadow(0 0 12px rgba(255,106,0,0.5)); }
          </style>
          <!-- FRONT (left figure) - Chest -->
          <path class="ov-zone" id="ov-chest" onclick="window.showZone('chest','Petto')" d="M160,260 L350,260 C370,260 380,280 380,300 L380,400 C370,420 340,440 260,440 C180,440 150,420 140,400 L140,300 C140,280 150,260 160,260 Z"/>
          <!-- FRONT - Shoulders -->
          <path class="ov-zone" id="ov-shoulders" onclick="window.showZone('shoulders','Spalle')" d="M120,220 L170,200 L250,190 L340,200 L400,220 L380,260 L140,260 Z"/>
          <!-- FRONT - Abs/Core -->
          <path class="ov-zone" id="ov-waist" onclick="window.showZone('waist','Vita')" d="M175,445 L345,445 L335,580 L185,580 Z"/>
          <!-- FRONT - Left Arm -->
          <path class="ov-zone" id="ov-bicep_l" onclick="window.showZone('bicep_l','Braccia')" d="M80,240 L140,240 L140,450 L115,500 L80,500 C65,430 60,340 80,240 Z"/>
          <!-- FRONT - Right Arm -->
          <path class="ov-zone" id="ov-bicep_r" onclick="window.showZone('bicep_l','Braccia')" d="M380,240 L440,240 C460,340 455,430 440,500 L405,500 L380,450 L380,240 Z"/>
          <!-- FRONT - Left Leg -->
          <path class="ov-zone" id="ov-thigh_l" onclick="window.showZone('thigh_l','Gambe')" d="M170,600 L260,600 L250,800 C240,820 220,820 200,820 C180,800 165,750 170,600 Z"/>
          <!-- FRONT - Right Leg -->
          <path class="ov-zone" id="ov-thigh_r" onclick="window.showZone('thigh_l','Gambe')" d="M265,600 L355,600 C360,750 345,800 325,820 C305,820 285,820 275,800 L265,600 Z"/>
          <!-- BACK (right figure) - Back/Lats -->
          <path class="ov-zone" id="ov-back" onclick="window.showZone('chest','Petto')" d="M600,260 L880,260 L890,400 C880,440 840,460 740,460 C640,460 600,440 590,400 L600,260 Z"/>
        </svg>
      </div>

      <div style="display:flex; flex-direction:column; gap:14px; padding-top:8px">
        <div style="font-size:9px; color:var(--t3); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px">Ultimo Check</div>

        <div class="legend-item" onclick="window.showZone('chest', 'Petto')" style="cursor:pointer">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:11px; font-weight:800; color:var(--t1)">PETTO</span>
            <span style="font-size:11px; font-weight:800" id="val-chest">—</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-chest" style="width:0%; background:rgba(255,255,255,0.15); transition:all 0.6s"></div></div>
        </div>

        <div class="legend-item" onclick="window.showZone('shoulders', 'Spalle')" style="cursor:pointer">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:11px; font-weight:800; color:var(--t1)">SPALLE</span>
            <span style="font-size:11px; font-weight:800" id="val-shoulders">—</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-shoulders" style="width:0%; background:rgba(255,255,255,0.15); transition:all 0.6s"></div></div>
        </div>

        <div class="legend-item" onclick="window.showZone('waist', 'Vita')" style="cursor:pointer">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:11px; font-weight:800; color:var(--t1)">VITA</span>
            <span style="font-size:11px; font-weight:800" id="val-waist">—</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-waist" style="width:0%; background:rgba(255,255,255,0.15); transition:all 0.6s"></div></div>
        </div>

        <div class="legend-item" onclick="window.showZone('bicep_l', 'Braccia')" style="cursor:pointer">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:11px; font-weight:800; color:var(--t1)">BRACCIA</span>
            <span style="font-size:11px; font-weight:800" id="val-arms">—</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-arms" style="width:0%; background:rgba(255,255,255,0.15); transition:all 0.6s"></div></div>
        </div>

        <div class="legend-item" onclick="window.showZone('thigh_l', 'Gambe')" style="cursor:pointer">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <span style="font-size:11px; font-weight:800; color:var(--t1)">GAMBE</span>
            <span style="font-size:11px; font-weight:800" id="val-legs">—</span>
          </div>
          <div class="pbb h4"><div class="pbf" id="bar-legs" style="width:0%; background:rgba(255,255,255,0.15); transition:all 0.6s"></div></div>
        </div>
      </div>
    </div>

    <div id="zone-info" style="margin-top:24px; min-height:60px; padding:16px; background:rgba(255,255,255,0.03); border-radius:16px; border:1px solid rgba(255,255,255,0.05);">
      <div style="font-size:13px;color:var(--t3);line-height:1.6; text-align:center">Tocca un gruppo muscolare per i dettagli.</div>
    </div>
  </div>

  <div id="checks-list-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:900;color:var(--t1)">Storico Completo</h2>
    </div>
    <div id="checks-list"><div class="spin"></div></div>
  </div>
  <div id="check-form" style="display:none"></div>
</div>

<script type="module" src="js/checks.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
