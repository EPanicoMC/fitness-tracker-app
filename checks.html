<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>KOVA.</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6fff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
<div class="wrap">
  <div class="ph">
    <button class="btn-icon" onclick="history.back()">←</button>
    <h1>📸 Check</h1>
    <button class="btn btn-v btn-sm" onclick="openNewCheck()">＋ Nuovo</button>
  </div>
  
  <!-- PROGRESSI HEADER -->
  <div style="display:flex;justify-content:center;gap:10px;margin-bottom:24px;">
    <button class="btn btn-v btn-sm" style="border-radius:100px;padding:6px 16px;">SETTIMANA</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:6px 16px;">MESE</button>
    <button class="btn btn-ghost btn-sm" style="border-radius:100px;padding:6px 16px;">ANNO</button>
  </div>

  <!-- VOLUME ALLENAMENTO -->
  <div class="card card-dark" style="margin-bottom:20px;padding:24px;">
    <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:4px">Volume Allenamento</div>
    <div style="font-size:28px;font-weight:900;color:var(--t1)"><span id="vol-total">0</span> <span style="font-size:14px;color:var(--t3);font-weight:700">kg</span></div>
    <div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:24px" id="vol-trend">+0% vs settimana scorsa</div>
    
    <!-- BAR CHART (Mockup structure for JS) -->
    <div id="vol-chart" style="display:flex;justify-content:space-between;align-items:flex-end;height:120px;gap:8px;padding-top:20px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:8px">
      <div class="spin"></div>
    </div>
  </div>

  <!-- BODY MAP -->
  <div id="body-map-section" class="card card-dark" style="position:relative; margin-bottom:30px; padding:24px;">
    <div style="font-size:11px;color:var(--t2);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px">Gruppi Muscolari</div>
    <div style="display:flex;gap:20px;align-items:center;">
      <div style="flex:1">
        <svg viewBox="0 0 200 300" style="width:100%; display:block; overflow:visible;">
          <style>
            .b-zone { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.1); stroke-width: 1.5; transition: all 0.3s; cursor: pointer; stroke-linejoin: round; stroke-linecap: round; }
            .b-zone:hover, .b-zone.active { fill: rgba(255,106,0,0.25); stroke: var(--accent); filter: drop-shadow(0 0 10px rgba(255,106,0,0.5)); z-index: 10; }
          </style>
          
          <g transform="translate(20, 10)">
            <!-- Head -->
            <path class="b-zone" id="bz-head" onclick="window.showZone('weight', 'Peso')" d="M 80 10 C 95 10 95 30 80 40 C 65 30 65 10 80 10 Z"/>
            
            <!-- Chest / Shoulders -->
            <path class="b-zone" id="bz-chest" onclick="window.showZone('chest', 'Petto')" d="M 60 45 L 100 45 C 120 50 120 75 100 85 L 60 85 C 40 75 40 50 60 45 Z"/>
            
            <!-- Core / Waist -->
            <path class="b-zone" id="bz-waist" onclick="window.showZone('waist', 'Core')" d="M 65 90 L 95 90 L 90 135 L 70 135 Z"/>
            
            <!-- Left Arm -->
            <path class="b-zone" id="bz-bicep_l" onclick="window.showZone('bicep_l', 'Braccio SX')" d="M 55 50 C 40 55 35 90 40 110 C 45 110 50 90 55 85 Z"/>
            
            <!-- Right Arm -->
            <path class="b-zone" id="bz-bicep_r" onclick="window.showZone('bicep_r', 'Braccio DX')" d="M 105 50 C 120 55 125 90 120 110 C 115 110 110 90 105 85 Z"/>
            
            <!-- Left Leg -->
            <path class="b-zone" id="bz-thigh_l" onclick="window.showZone('thigh_l', 'Coscia SX')" d="M 65 140 L 78 140 L 78 205 C 70 205 60 180 65 140 Z"/>
            
            <!-- Right Leg -->
            <path class="b-zone" id="bz-thigh_r" onclick="window.showZone('thigh_r', 'Coscia DX')" d="M 82 140 L 95 140 C 100 180 90 205 82 205 L 82 140 Z"/>
            
            <!-- Left Calf -->
            <path class="b-zone" id="bz-calf_l" onclick="window.showZone('calf_l', 'Polp. SX')" d="M 68 210 L 78 210 C 80 240 75 260 70 260 C 65 260 60 240 68 210 Z"/>
            
            <!-- Right Calf -->
            <path class="b-zone" id="bz-calf_r" onclick="window.showZone('calf_r', 'Polp. DX')" d="M 82 210 L 92 210 C 100 240 95 260 90 260 C 85 260 80 240 82 210 Z"/>
          </g>
        </svg>
      </div>
      <div style="width:100px; display:flex; flex-direction:column; gap:16px;">
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);display:inline-block;margin-right:6px"></div>PETTO<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-chest">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px"></div>CORE<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-waist">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px"></div>GAMBE<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-legs">—</span></div>
        <div style="font-size:10px;color:var(--t1);font-weight:800"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px"></div>BRACCIA<br><span style="color:var(--t3);font-size:12px;font-weight:500;margin-left:14px" id="lbl-arms">—</span></div>
      </div>
    </div>
    <div id="zone-info" style="margin-top:20px; min-height:60px; padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(255,255,255,0.03);">
      <div style="font-size:13px;color:var(--t3);line-height:1.6">Tocca un gruppo muscolare sulla sinistra per espandere lo storico.</div>
    </div>
  </div>

  <div id="checks-list-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:900;color:var(--t1)">Storico Completo</h2>
    </div>
    <div id="checks-list"><div class="spin"></div></div>
  </div>
  <div id="check-form" style="display:none"></div>
</div>

<script type="module" src="js/checks.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/fitness-tracker-app/sw.js')</script>
</body>
</html>
