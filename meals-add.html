<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker – Aggiungi Pasto</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="max-width:480px;margin:0 auto;padding:16px;padding-bottom:80px">
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>Aggiungi Pasto</h1>
  </div>

  <!-- Hint calcolo automatico -->
  <div class="card" style="border-color:var(--accent);margin-bottom:20px">
    <p style="font-size:13px;color:var(--text-secondary)">✨ Inserisci macro → le kcal vengono calcolate automaticamente</p>
  </div>

  <form id="meal-form">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Tipo pasto</label>
        <select class="form-input" id="meal-type">
          <option value="colazione">🌅 Colazione</option>
          <option value="pranzo" selected>☀️ Pranzo</option>
          <option value="cena">🌙 Cena</option>
          <option value="spuntino">🍎 Spuntino</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-input" id="meal-date" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Nome pasto</label>
      <input type="text" class="form-input" id="meal-name" placeholder="Es. Pollo con riso, Pasta..." required>
    </div>

    <div class="macro-grid">
      <div class="form-group">
        <label class="form-label">Proteine (g)</label>
        <input type="number" class="form-input macro-input" id="meal-protein" placeholder="0" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Carboidrati (g)</label>
        <input type="number" class="form-input macro-input" id="meal-carbs" placeholder="0" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Grassi (g)</label>
        <input type="number" class="form-input macro-input" id="meal-fats" placeholder="0" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Kcal</label>
        <input type="number" class="form-input" id="meal-kcal" placeholder="calcolate auto" min="0">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Note (opzionale)</label>
      <textarea class="form-input" id="meal-notes" rows="2" placeholder="..."></textarea>
    </div>

    <button type="submit" class="btn-primary" id="submit-meal-btn">💾 Salva Pasto</button>
  </form>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="workout.html" class="nav-item"><span class="nav-icon">💪</span><span>Workout</span></a>
  <a href="meals.html" class="nav-item active"><span class="nav-icon">🥗</span><span>Pasti</span></a>
  <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
</nav>

<script type="module" src="js/meals.js"></script>
</body>
</html>
